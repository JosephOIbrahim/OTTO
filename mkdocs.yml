# OTTO OS Documentation
# Built with MkDocs + Material theme
# https://otto-os.readthedocs.io

site_name: OTTO OS
site_description: Cognitive Operating System - ADHD-Native AI Assistant
site_author: OTTO Team
site_url: https://otto-os.readthedocs.io

repo_name: OTTO_OS
repo_url: https://github.com/JosephOIbrahim/OTTO_OS
edit_uri: edit/master/docs/

# Theme Configuration
theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

# Plugins
plugins:
  - search
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Extra
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JosephOIbrahim/OTTO_OS
  generator: false
  version:
    provider: mike

extra_css:
  - stylesheets/extra.css

# Navigation Structure
nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: QUICKSTART.md
    - Installation: getting-started/installation.md
    - Configuration: CONFIGURATION.md
    - User Guide: USER_GUIDE.md
  - Architecture:
    - Overview: ARCHITECTURE.md
    - Cognitive Blend: COGNITIVE_BLEND_ARCHITECTURE.md
    - USD Substrate: USD_COGNITIVE_SUBSTRATE_V5.md
    - Determinism: DETERMINISM.md
    - Agents: AGENTS.md
  - API Reference:
    - Overview: API.md
    - Mobile API: api/mobile.md
    - WebSocket API: api/websocket.md
    - Push Notifications: api/push.md
    - WebAuthn: api/webauthn.md
    - Security API: api/security.md
    - Implementation Index: API_IMPLEMENTATION_INDEX.md
  - Security:
    - Checklist: SECURITY_CHECKLIST.md
    - Determinism: THINKINGMACHINES_COMPLIANCE.md
    - Audit Reports: HE2025_DEEP_CONSISTENCY_AUDIT.md
  - Integration:
    - Integration Guide: INTEGRATION_GUIDE.md
    - Matrix Bot: integration/matrix.md
    - PWA Dashboard: integration/pwa.md
  - Development:
    - Contributing: development/contributing.md
    - Testing: development/testing.md
    - Production Roadmap: API_PRODUCTION_ROADMAP.md
  - Reference:
    - Framework Synthesis: V5_FRAMEWORK_SYNTHESIS.md
    - Pitch: PITCH.md
    - Product README: PRODUCT_README.md

# Watch for changes
watch:
  - docs
  - src
