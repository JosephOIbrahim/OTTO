name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Show installed packages
        run: pip list

      - name: Verify installation
        run: |
          python -c "import orchestra; print(f'Orchestra {orchestra.__version__} installed')"
          python -c "import pytest; print(f'pytest {pytest.__version__}')"
          python -c "import pydantic; print(f'pydantic {pydantic.__version__}')"

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=src/orchestra --cov-report=term-missing --cov-report=xml --cov-fail-under=50

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  # Summary job that branch protection can require
  test-status:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Tests failed"
            exit 1
          fi
          echo "All tests passed"
