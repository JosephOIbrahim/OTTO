[pytest]
# Test markers for categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (full workflow)
    chaos: Chaos engineering tests (fault injection)
    performance: Performance benchmarks (SLA verification)
    contracts: Contract and schema validation

# Default options
addopts =
    --verbose
    --tb=short
    -ra

# Async mode for pytest-asyncio
asyncio_mode = auto

# Test timeout (5 minutes max per test)
timeout = 300

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Coverage configuration (when using pytest-cov)
# Run with: pytest --cov=framework_ottotor --cov-report=html
# addopts = --cov=framework_ottotor --cov-fail-under=80

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S

# Minimum version
minversion = 7.0
